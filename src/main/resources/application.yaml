server:
  port: 8080
spring:
  application:
    name: comments
  datasource:
    url: jdbc:h2:mem:~
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    redis:
      time-to-live: 10s
  data:
    redis:
      host: localhost
      port: 6379
